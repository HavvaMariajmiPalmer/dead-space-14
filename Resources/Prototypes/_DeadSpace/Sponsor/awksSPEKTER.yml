#JawsOfLife
- type: entity
  parent: JawsOfLife
  id: JawsOfLifeawksSPEKTER
  name: челюсти жизни 
  description: Официальный инструмент для высвобождения из тисков рутины с минимальными психологическими травмами.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _DeadSpace/Sponsor/awksSPEKTER/tools_jawsoflife.rsi
    state: syn_jaws_pry
  - type: Item
    size: Normal
  - type: MultipleTool
    entries:
      - behavior: Prying
        sprite:
          sprite: _DeadSpace/Sponsor/awksSPEKTER/tools_jawsoflife.rsi
          state: syn_jaws_pry
        useSound: /Audio/Items/jaws_pry.ogg
        changeSound: /Audio/Items/change_jaws.ogg
      - behavior: Cutting
        sprite:
          sprite: _DeadSpace/Sponsor/awksSPEKTER/tools_jawsoflife.rsi
          state: syn_jaws_cutter
        useSound: /Audio/Items/jaws_cut.ogg
        changeSound: /Audio/Items/change_jaws.ogg

